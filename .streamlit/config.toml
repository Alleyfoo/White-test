# Streamlit app config for the White Mushroom Test verifier.
# Theme only — kept minimal. See https://docs.streamlit.io/library/api-reference

[server]
# Headless: do NOT auto-open a browser, and do NOT show the first-run email
# onboarding prompt. The prompt reads stdin and blocks the server from binding
# on platforms that allocate a pseudo-TTY for log capture (e.g. Streamlit
# Community Cloud), producing a persistent /healthz connection-refused. Setting
# headless=true suppresses that prompt so the server boots cleanly. Streamlit
# still prints the local URL either way.
headless = true

[theme]
base = "light"
primaryColor = "#8A4A11"